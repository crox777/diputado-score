name: weekly-data-refresh

# Re-scrapes Delfino.cr once a week and commits the refreshed snapshot.
# The Vercel project is connected to this repo (Vercel → Git), so the push
# deploys to production automatically — no tokens or deploy step needed here.
# Runnable on demand via the "Run workflow" button.

on:
  schedule:
    # Saturday 07:00 UTC = Saturday 01:00 Costa Rica (UTC-6, no DST).
    # The plenary sits Mon-Thu and Delfino posts attendance/votes within ~a day,
    # so a Saturday run captures the full, settled legislative week.
    - cron: "0 7 * * 6"
  workflow_dispatch: {}

concurrency:
  group: weekly-data-refresh
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Ingest latest data from Delfino.cr
        run: npm run ingest

      - name: Commit snapshot if it changed
        run: |
          if git diff --quiet -- src/data/diputados.json; then
            echo "No changes in src/data/diputados.json."
          else
            git config user.name "DiputadoScore Bot"
            git config user.email "noreply@diputadoscore.app"
            git add src/data/diputados.json
            git commit -m "chore(data): weekly refresh from Delfino.cr"
            git push
          fi
