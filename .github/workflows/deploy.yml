name: deploy

# Triggers a Vercel production deploy on every push to main, no matter who pushed.
# The Vercel Git integration only deploys pushes from Vercel team members, so a
# collaborator's push would otherwise never go live. Firing the project's Deploy
# Hook from here decouples deploys from Vercel team membership.
#
# Note: pushes made by the weekly-data-refresh bot use GITHUB_TOKEN and do NOT
# trigger this workflow (GitHub blocks token-pushed events from starting runs),
# so that workflow fires the same hook itself after it pushes.

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy hook
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            echo "VERCEL_DEPLOY_HOOK secret is not set." >&2
            exit 1
          fi
          curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" >/dev/null
          echo "Vercel deploy triggered for ${{ github.sha }}."
